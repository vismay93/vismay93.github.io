    <!-- ===== Blog Hero ===== -->
    <section class="blog-hero">
        <div class="hero-bg"></div>
        <div class="bg-glow bg-glow-1"></div>

    <main>
        <section class="section" style="padding-top: 30px;">

                <!-- Filters — dynamically generated -->
                <div class="blog-filters animate-on-scroll" id="blogFilters">
                    <button class="blog-filter-tag active" data-filter="all">All Posts</button>
                </div>

                <!-- Blog Grid — dynamically populated -->
                <div class="blog-grid" id="blogGrid">
                    <!-- Posts loaded from blog/posts.json -->
                </div>

                <!-- Empty state -->
                <div class="blog-empty-state" id="blogEmpty" style="display: none;">

    <script src="js/scripts.js" defer></script>
    <script>
        (async function () {
            const blogGrid = document.getElementById('blogGrid');
            const blogFilters = document.getElementById('blogFilters');
            const blogEmpty = document.getElementById('blogEmpty');

            try {
                const res = await fetch('blog/posts.json');
                const posts = await res.json();

                if (!posts.length) {
                    blogEmpty.style.display = '';
                    return;
                }

                // Build unique category list for filters
                const categories = [...new Set(posts.map(p => p.category))];
                categories.forEach(cat => {
                    const btn = document.createElement('button');
                    btn.className = 'blog-filter-tag';
                    btn.setAttribute('data-filter', cat);
                    btn.textContent = cat;
                    blogFilters.appendChild(btn);
                });

                // Render blog cards
                posts
                    .sort((a, b) => new Date(b.date) - new Date(a.date))
                    .forEach((post, i) => {
                        const dateStr = new Date(post.date).toLocaleDateString('en-US', {
                            year: 'numeric', month: 'short', day: 'numeric'
                        });

                        const card = document.createElement('article');
                        card.className = 'blog-card glass-card animate-on-scroll' + (i > 0 ? ' animate-delay-' + Math.min(i * 2, 6) : '');
                        card.setAttribute('data-category', post.category);
                        card.innerHTML =
                            '<div class="blog-card-image">' +
                            '<img src="' + post.image + '" alt="' + post.title + '">' +
                            '</div>' +
                            '<div class="blog-card-body">' +
                            '<div class="blog-meta">' +
                            '<span class="blog-category">' + post.category + '</span>' +
                            '<span>' + dateStr + '</span>' +
                            '<span>' + post.readTime + ' read</span>' +
                            '</div>' +
                            '<h3>' + post.title + '</h3>' +
                            '<p>' + post.excerpt + '</p>' +
                            '<a href="blog/' + post.slug + '.html" class="blog-read-more">' +
                            'Read more <i class="fa fa-arrow-right"></i>' +
                            '</a>' +
                            '</div>';
                        blogGrid.appendChild(card);
                    });

                // Re-observe new cards for scroll animation
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                            observer.unobserve(entry.target);
                        }
                    });
                }, { rootMargin: '0px 0px -60px 0px', threshold: 0.15 });

                document.querySelectorAll('.blog-card.animate-on-scroll').forEach(el => observer.observe(el));

                // Filter click handlers
                blogFilters.addEventListener('click', (e) => {
                    const btn = e.target.closest('.blog-filter-tag');
                    if (!btn) return;

                    blogFilters.querySelectorAll('.blog-filter-tag').forEach(t => t.classList.remove('active'));
                    btn.classList.add('active');

                    const filter = btn.getAttribute('data-filter');
                    document.querySelectorAll('.blog-card').forEach(card => {
                        if (filter === 'all' || card.getAttribute('data-category') === filter) {
                            card.style.display = '';
                            card.style.opacity = '0';
                            card.style.transform = 'translateY(20px)';
                            requestAnimationFrame(() => {
                                card.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
                                card.style.opacity = '1';
                                card.style.transform = 'translateY(0)';
                            });
                        } else {
                            card.style.display = 'none';
                        }
                    });
                });

            } catch (err) {
                blogEmpty.style.display = '';
                console.warn('Could not load blog posts:', err);
            }
        })();
    </script>
</body>

</html>
