        </div>

    <main>
        <!-- Blog post hero -->
        <section class="blog-hero" style="padding-bottom: 20px;">
            <div class="hero-bg"></div>
            <div class="animate-on-scroll">
                <div class="blog-meta" style="justify-content: center; margin-bottom: 16px;" id="postMeta"></div>
                <h1 id="postTitle" style="font-size: 2.6rem; max-width: 740px; margin: 0 auto;">Loading...</h1>

        </section>

        <!-- Blog post body -->
        <article class="blog-post-content">
            <div class="blog-post-body animate-on-scroll" id="postBody">
                <p style="text-align: center; color: var(--text-muted);">Loading post...</p>
            </div>

            <div
                style="margin-top: 60px; padding-top: 30px; border-top: 1px solid var(--border-glass); text-align: center;">
                <a href="../blog.html" class="btn-outline" style="display: inline-flex;">

    <!-- ===== Footer ===== -->

    <script src="../js/scripts.js"></script>
    <!-- marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        (async function () {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('slug');

            if (!slug) {
                document.getElementById('postTitle').textContent = 'Post not found';
                document.getElementById('postBody').innerHTML = '<p>No post slug was specified. <a href="../blog.html">Return to blog</a>.</p>';
                return;
            }

            try {
                // Load post metadata from manifest
                const manifestRes = await fetch('posts.json');
                const posts = await manifestRes.json();
                const post = posts.find(p => p.slug === slug);

                if (post) {
                    document.title = post.title + ' — Vismay Patel';
                    document.getElementById('postTitle').textContent = post.title;
                    document.getElementById('postMeta').innerHTML =
                        '<span class="blog-category">' + post.category + '</span>' +
                        '<span>' + new Date(post.date).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }) + '</span>' +
                        '<span>' + post.readTime + ' read</span>';
                }

                // Load and render markdown
                const mdRes = await fetch('posts/' + slug + '.md');
                if (!mdRes.ok) throw new Error('Post file not found');
                const mdText = await mdRes.text();

                document.getElementById('postBody').innerHTML = marked.parse(mdText);

            } catch (err) {
                document.getElementById('postTitle').textContent = 'Post not found';
                document.getElementById('postBody').innerHTML =
                    '<p style="text-align:center;">Could not load this post. <a href="../blog.html">Return to blog</a>.</p>';
            }
        })();
    </script>
</body>
